<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48dGV4dCB5PSIuOWVtIiBmb250LXNpemU9IjkwIj7wn46b77iPPC90ZXh0Pjwvc3ZnPg==">
<title>Gestione Audio Regie — CCRF</title>
<style>
:root{
  --bg:#0f172a; --bg2:#111c34; --panel:#152238; --panel2:#1b2b47; --line:#26385a;
  --txt:#e6edf7; --muted:#94a6c4; --accent:#3b82f6; --accent2:#22c55e; --warn:#f59e0b;
  --danger:#ef4444; --chip:#1e3a5f; --radius:10px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:"Segoe UI",system-ui,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
button{font-family:inherit;cursor:pointer}
a{color:var(--accent)}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 10px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:64px}
.app{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.side{width:250px;background:linear-gradient(180deg,#0d1728,#0f1e38);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:18px 18px 12px;border-bottom:1px solid var(--line)}
.brand h1{font-size:15px;margin:0;letter-spacing:.3px}
.brand small{color:var(--muted);font-size:11px}
.nav{padding:10px;overflow:auto;flex:1}
.nav .grp{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin:14px 10px 6px}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--txt);text-decoration:none;font-size:13.5px;margin-bottom:2px}
.nav a:hover{background:var(--panel)}
.nav a.active{background:var(--accent);color:#fff;font-weight:600}
.nav a .ico{width:18px;text-align:center}
.nav a .cnt{margin-left:auto;background:rgba(255,255,255,.12);border-radius:20px;padding:1px 8px;font-size:11px}
.dbstat{padding:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted)}
.dbstat .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:6px}
.dbstat.ok .dot{background:var(--accent2)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--bg2);flex-shrink:0}
.top .title{font-size:16px;font-weight:600}
.top .sp{flex:1}
.content{flex:1;overflow:auto;padding:20px}

.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 14px;border-radius:8px;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.08)}
.btn.green{background:var(--accent2);border-color:var(--accent2);color:#04240f}
.btn.danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn.sm{padding:5px 9px;font-size:12px}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card .k{color:var(--muted);font-size:12px}
.card .v{font-size:28px;font-weight:700;margin-top:6px}
.card .sub{color:var(--muted);font-size:11px;margin-top:4px}

/* Table */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input.search{max-width:280px}
.toolbar select{width:auto;min-width:130px}
.tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:auto;max-height:calc(100vh - 210px)}
table{border-collapse:collapse;width:100%;font-size:12.5px;white-space:nowrap}
th,td{padding:8px 11px;border-bottom:1px solid var(--line);text-align:left}
th{position:sticky;top:0;background:var(--panel2);z-index:2;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;white-space:nowrap}
tbody tr:hover{background:var(--panel2)}
td .rowbtn{opacity:0;transition:.1s}
tr:hover td .rowbtn{opacity:1}
.tag{display:inline-block;background:var(--chip);color:#bcd4f5;border-radius:20px;padding:2px 9px;font-size:11px}
.tag.g{background:#14361f;color:#7ee2a0}
.tag.o{background:#3a2a12;color:#f2c179}
.tag.r{background:#3a1a1a;color:#f2a0a0}
.empty{color:#5f7397;font-style:italic}
.muted{color:var(--muted)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(3,8,20,.66);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 16px;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:14px;width:100%;max-width:860px;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal.wide{max-width:1100px}
.modal .mh{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal .mh h3{margin:0;font-size:15px}
.modal .mh .x{margin-left:auto;background:none;border:none;color:var(--muted);font-size:22px;line-height:1}
.modal .mb{padding:18px 20px;max-height:70vh;overflow:auto}
.modal .mf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 16px}
.fld label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.section-h{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:6px}

/* Switch port grid */
.swhead{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.sw-hero{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:linear-gradient(135deg,#2c2a18,#1b1a0f);border:1px solid #4d4622;border-radius:12px;padding:15px 18px;margin-bottom:14px}
.sw-hero .h-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px}
.sw-hero .h-sub{color:#cabf8f;font-size:12.5px;margin-top:6px}
.sw-hero .h-sub b{color:#e7dcae;font-weight:600}
.sw-hero .h-actions{display:flex;gap:8px;flex-wrap:wrap}
.portgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;max-width:960px}
.port{display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;min-height:48px}
.port:hover{border-color:var(--accent);background:var(--panel2)}
.port.occ{background:#122a45;border-color:#2a5a8a}
.port .num{font-weight:700;background:var(--panel2);border-radius:7px;min-width:32px;height:30px;display:flex;align-items:center;justify-content:center;padding:0 6px;font-size:12.5px;color:var(--muted);flex-shrink:0}
.port.occ .num{color:#1a1205}
.port .info{overflow:hidden;min-width:0}
.port .info .d{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.port.occ .info .d{font-weight:600;color:var(--txt)}
.port .info .s{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.port .info .free{font-size:12px;color:#5f7397;font-style:italic}
.legend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted);margin:6px 0 16px}
.legend .lg{display:inline-flex;align-items:center;gap:7px}
.legend .lg i{width:14px;height:14px;border-radius:4px;display:inline-block}
.legend .lg i.occ{background:#122a45;border:1px solid #2a5a8a}
.legend .lg i.free{background:var(--panel);border:1px solid var(--line)}
.sw-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;cursor:pointer}
.sw-card:hover{border-color:var(--accent)}
.sw-card h4{margin:0 0 6px;font-size:14px}
.bar{height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:var(--accent)}
.backlink{color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:12px;display:inline-block}
.backlink:hover{color:var(--accent)}
.help{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;color:var(--muted);font-size:12.5px;margin-bottom:16px;line-height:1.6}
.toast{position:fixed;bottom:20px;right:20px;background:var(--panel2);border:1px solid var(--accent2);color:var(--txt);padding:12px 18px;border-radius:10px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transform:translateY(10px);transition:.25s}
.toast.show{opacity:1;transform:none}
.pill{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--chip);color:#bcd4f5;cursor:pointer}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.dz{border:1px dashed var(--line);border-radius:8px;padding:8px 10px;display:flex;gap:8px;align-items:center;justify-content:space-between}
kbd{background:#0b1424;border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11px}

/* ===== Quadro Incroci (matrice audio tipo Dante Controller) ===== */
.xp-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.xp-toolbar .grpbtn{display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.xp-toolbar .grpbtn>button{background:var(--panel2);border:none;border-right:1px solid var(--line);color:var(--txt);padding:6px 10px;font-size:12px}
.xp-toolbar .grpbtn>button:last-child{border-right:none}
.xp-toolbar .grpbtn>button:hover{background:var(--accent);color:#fff}
.xp-stat{font-size:12px;color:var(--muted)}
.xp-stat b{color:var(--accent2)}
.xp-scroll{position:relative;overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);max-height:calc(100vh - 205px)}
table.xp{border-collapse:separate;border-spacing:0;font-size:11px;white-space:nowrap}
table.xp th,table.xp td{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:0;margin:0}
/* corner */
table.xp .corner{position:sticky;left:0;top:0;z-index:6;background:var(--bg2);min-width:230px;max-width:230px;width:230px;padding:6px 10px;text-align:left;vertical-align:bottom;white-space:normal}
table.xp .corner b{color:var(--accent);font-size:11px}
table.xp .corner small{display:block;color:var(--muted);font-size:10px;margin-top:2px}
/* input device header (columns) */
table.xp thead th.dev{position:sticky;top:0;z-index:4;background:var(--panel2);color:#bcd4f5;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;text-align:center;cursor:pointer;border-bottom:2px solid var(--accent)}
table.xp thead th.dev:hover{background:var(--accent);color:#fff}
table.xp thead th.dev .cc{color:var(--accent2);font-weight:700}
/* input channel header (rotated) */
table.xp thead th.ch{position:sticky;top:0;z-index:3;background:var(--panel2);height:150px;min-width:26px;max-width:26px;width:26px;vertical-align:bottom;cursor:pointer;padding:0}
table.xp thead th.ch>div{width:26px;transform-origin:bottom left;transform:translateX(23px) rotate(-90deg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:146px;font-size:10.5px;padding-bottom:5px;text-align:left}
table.xp thead th.ch:hover{background:var(--accent)}
table.xp thead th.ch.hl{background:var(--accent);color:#fff}
/* collapsed input device = single vertical column */
table.xp thead th.devcol{position:sticky;top:0;z-index:4;background:#173049;height:150px;min-width:30px;max-width:30px;width:30px;vertical-align:bottom;cursor:pointer;padding:0;border-bottom:2px solid var(--accent)}
table.xp thead th.devcol>div{width:30px;transform-origin:bottom left;transform:translateX(26px) rotate(-90deg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:146px;font-size:11px;font-weight:600;color:#bcd4f5;padding-bottom:6px;text-align:left}
table.xp thead th.devcol:hover>div{color:#fff}
table.xp thead th.devcol:hover{background:var(--accent)}
table.xp thead th.dev>span{white-space:nowrap}
/* output device row header */
table.xp tr.devrow th{position:sticky;left:0;z-index:2;background:var(--panel2);color:#bcd4f5;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:6px 10px;text-align:left;cursor:pointer;border-top:2px solid var(--accent);min-width:230px;max-width:230px;width:230px}
table.xp tr.devrow th:hover{background:var(--accent);color:#fff}
table.xp tr.devrow th .cc{color:var(--accent2);font-weight:700}
table.xp tr.devrow td.blk{background:var(--panel)}
/* output channel row label (sticky left) */
table.xp td.rowlab{position:sticky;left:0;z-index:1;background:var(--bg2);min-width:230px;max-width:230px;width:230px;padding:3px 10px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.xp td.rowlab:hover{background:var(--panel2)}
table.xp td.rowlab.hl{background:var(--accent);color:#fff}
table.xp td.rowlab .lr{display:inline-block;min-width:16px;color:var(--muted);font-weight:700}
table.xp td.rowlab .src{color:var(--accent2);font-size:10px}
/* crosspoints */
table.xp td.xp{width:26px;min-width:26px;max-width:26px;height:22px;text-align:center;cursor:pointer;background:var(--panel)}
table.xp td.xp:hover{background:#1d3a5f}
table.xp td.xp.on{background:#123a22}
table.xp td.xp.on::after{content:"";display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px rgba(34,197,94,.7)}
table.xp td.xp.rhl{background:#16263f}
table.xp td.xp.chl{background:#16263f}
table.xp td.xp.on.rhl,table.xp td.xp.on.chl{background:#123a22}
/* aggregate (device x device) cell */
table.xp td.agg{width:30px;min-width:30px;max-width:30px;text-align:center;cursor:pointer;background:var(--panel);color:var(--muted);font-size:12px;padding:4px 2px}
table.xp td.agg:hover{background:#1d3a5f;color:#fff}
table.xp td.agg.has{background:#123a22;color:var(--accent2);font-weight:700}
table.xp td.agg.mixed{cursor:default}
/* CCRF device cards */
.ccrf-dev{display:flex;justify-content:space-between;align-items:center;gap:10px}
.ccrf-dev .n{font-weight:600}
.ccrf-dev .b{font-size:11px;color:var(--muted)}

/* Patch audio (sviluppo orizzontale) */
.patchwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);max-width:100%}
table.patch{border-collapse:separate;border-spacing:0;font-size:12px;white-space:nowrap}
table.patch th,table.patch td{border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
table.patch th.rl{position:sticky;left:0;z-index:2;background:var(--panel2);text-align:left;padding:6px 10px;min-width:160px;color:var(--muted);text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}
table.patch th.porthead{background:var(--panel2);text-align:center;padding:4px 6px;min-width:96px}
table.patch th.porthead .pn{font-weight:700}
table.patch td{padding:0}
table.patch td input{border:none;background:transparent;text-align:center;width:100%;min-width:96px;padding:6px 6px;border-radius:0}
table.patch td input:focus{background:var(--bg2);outline:1px solid var(--accent)}
table.patch tr.hl-row th.rl{color:#e9d27a}
table.patch tr.hl-row td{background:#39320f}
table.patch tr.hl-row td input{color:#f2e39a;font-weight:600}
table.patch tr.prov td{background:#122033}
table.patch tr.prov td input{font-weight:600}
table.patch th.porthead.hlcol{box-shadow:inset 0 0 0 2px var(--accent2);background:#123a22}
table.patch td.hlcol{box-shadow:inset 0 0 0 2px var(--accent2)}
table.patch td.hlcol input{background:rgba(34,197,94,.12)}
table.patch td.colcell{padding:3px}
table.patch td.colcell input[type=color]{width:100%;min-width:70px;height:26px;padding:0;border:1px solid var(--line);border-radius:4px;background:transparent;cursor:pointer}
table.patch td.destcell{padding:0 2px;white-space:nowrap}
table.patch td.destcell input{width:calc(100% - 26px);min-width:70px;display:inline-block;vertical-align:middle}
table.patch td.destcell .destgo{display:inline-flex;align-items:center;vertical-align:middle;margin-left:2px;padding:1px 6px;border:none;font-size:12px}
.boxfig{border:1px solid var(--line);border-radius:10px;background:#0f1520;padding:14px;margin:12px 0;max-width:100%;overflow-x:auto}
.boxfig .panel{background:linear-gradient(#1b2536,#151d29);border:1px solid #2a3550;border-radius:8px;padding:12px;min-width:520px}
.boxfig .top{display:flex;align-items:center;gap:18px;flex-wrap:wrap;padding-bottom:10px;margin-bottom:12px;border-bottom:1px dashed #33405e}
.boxfig .ctl{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.boxfig .sw{width:28px;height:15px;border-radius:8px;background:#2a3550;border:1px solid #3a4870;position:relative;flex:none}
.boxfig .sw::after{content:'';position:absolute;top:1px;left:1px;width:12px;height:11px;border-radius:6px;background:#8aa0c8}
.boxfig .led{width:12px;height:12px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;flex:none}
.boxfig .plug{width:24px;height:24px;border-radius:4px;background:#0c1420;border:2px solid #3a4870;position:relative;flex:none}
.boxfig .plug::after{content:'';position:absolute;inset:5px;border:1px solid #3a4870;border-radius:2px}
.boxfig .conns{display:flex;gap:10px;flex-wrap:wrap}
.boxfig .conn{width:100px;border:1px solid #33405e;border-radius:8px;background:#111a27;padding:8px 6px;text-align:center}
.boxfig .conn .num{font-size:10px;color:var(--muted)}
.boxfig .conn .xlr{width:42px;height:42px;border-radius:50%;margin:3px auto 6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:2px solid #4a5a80;background:#0c1420;color:#cfe0ff}
.boxfig .conn .xlr{position:relative}
.boxfig .conn.f .xlr{border-color:#ef4444;color:#ffd7d7}
.boxfig .conn.m .xlr{border-color:#3b82f6;color:#d7e6ff}
.boxfig .conn.gen .xlr{border-color:#8b93a7;color:#dfe4ee}
/* RJ45: connettore rettangolare (ethernet) con linguetta */
.boxfig .conn.rj45 .xlr{border-radius:5px;border-color:#14b8a6;color:#c7f5ec;font-size:10.5px;font-weight:700}
.boxfig .conn.rj45 .xlr::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:14px;height:6px;background:#14b8a6;border-radius:0 0 3px 3px}
/* BNC: connettore coassiale (circolare a doppio anello) */
.boxfig .conn.bnc .xlr{border-color:#f59e0b;color:#ffe6bd;font-size:11px;font-weight:700;box-shadow:inset 0 0 0 4px rgba(245,158,11,.28)}
.boxfig .conn.free{opacity:.42}
.boxfig .conn.hl{box-shadow:0 0 0 2px var(--accent2);border-color:var(--accent2);opacity:1}
.boxfig .conn .sig{font-size:11px;font-weight:600;color:#e8eefc;word-break:break-word;min-height:14px}
.boxfig .conn .cw{width:100%;height:6px;border-radius:3px;margin-top:6px;background:#2a3550}
.boxfig .conn .cp{font-size:10px;color:var(--muted);margin-top:4px;word-break:break-word}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand">
      <h1>🎛️ Gestione Audio</h1>
      <small>Regie &amp; Matrice CCRF · dati locali</small>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="dbstat" id="dbstat">
      <span class="dot"></span><span id="dbstatText">Database non collegato</span>
    </div>
  </aside>
  <main class="main">
    <div class="top">
      <div class="title" id="viewTitle">Dashboard</div>
      <div class="sp"></div>
      <button class="btn sm" id="btnConnect">📂 Cartella database</button>
      <button class="btn sm green" id="btnSave">💾 Salva</button>
      <button class="btn sm" id="btnBackup">⤓ Backup</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>
<script>

/* ---------- Seed minimo: la struttura dati vive nel AUDIO_database.json esterno ---------- */
const SEED_DB = {"meta":{"versione":1,"app":"Gestione Audio Regie (CCRF)","creato":"2026-07-20","descrizione":"Database locale - matrice audio delle regie radiofoniche. Tutti i dati risiedono nel file AUDIO_database.json esterno."}};

/* -------------------- Stato & persistenza -------------------- */
let DB = null;
let fileHandle = null;      // FileSystemFileHandle sul AUDIO_database.json
let dirty = false;
let autosaveTimer = null;
const hasFS = 'showSaveFilePicker' in window;

const IDB = {
  db:null,
  open(){ return new Promise((res,rej)=>{ const r=indexedDB.open('gestioneaudio',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>{IDB.db=r.result;res()}; r.onerror=()=>rej(r.error); }); },
  async set(k,v){ if(!IDB.db) await IDB.open(); return new Promise((res,rej)=>{ const t=IDB.db.transaction('kv','readwrite'); t.objectStore('kv').put(v,k); t.oncomplete=res; t.onerror=()=>rej(t.error);}); },
  async get(k){ if(!IDB.db) await IDB.open(); return new Promise((res,rej)=>{ const t=IDB.db.transaction('kv','readonly'); const rq=t.objectStore('kv').get(k); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error);}); }
};

function clone(o){ return JSON.parse(JSON.stringify(o)); }
function uid(p){ return p+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function markDirty(){ dirty=true; if(typeof invalidateChIndex==='function') invalidateChIndex(); renderDbStat(); clearTimeout(autosaveTimer); autosaveTimer=setTimeout(saveDB,1500); }

async function loadDB(){
  // 1) prova a riconnettere il file handle salvato
  try{
    const h = await IDB.get('fileHandle');
    if(h){
      const perm = await h.queryPermission({mode:'readwrite'});
      if(perm==='granted'){
        fileHandle=h;
        const txt = await (await h.getFile()).text();
        DB = JSON.parse(txt); dirty=false; return 'file';
      } else { fileHandle=h; } // richiederà permesso al primo salvataggio
    }
  }catch(e){ console.warn('handle',e); }
  // 2) fallback: copia di lavoro nel browser
  const local = localStorage.getItem('gestioneaudio_db');
  if(local){ try{ DB=JSON.parse(local); return 'local'; }catch(e){} }
  // 3) dati iniziali (seed)
  DB = clone(SEED_DB); return 'seed';
}

async function saveDB(){
  DB.meta.salvato = new Date().toISOString();
  const txt = JSON.stringify(DB);
  localStorage.setItem('gestioneaudio_db', txt);
  if(fileHandle){
    try{
      let perm = await fileHandle.queryPermission({mode:'readwrite'});
      if(perm!=='granted') perm = await fileHandle.requestPermission({mode:'readwrite'});
      if(perm==='granted'){
        const w = await fileHandle.createWritable();
        await w.write(txt); await w.close();
        dirty=false; renderDbStat(); toast('Database salvato su file'); return;
      }
    }catch(e){ console.warn(e); toast('Errore salvataggio file — copia locale ok'); }
  }
  dirty=false; renderDbStat();
  toast(hasFS?'Salvato in locale (collega una cartella per il file)':'Salvato nel browser');
}

async function connectFolder(){
  if(!hasFS){ toast('Browser senza accesso file: usa Edge o Chrome, oppure Backup/Ripristino'); return; }
  const create = confirm('OK = CREA un nuovo AUDIO_database.json in una cartella\nAnnulla = APRI un AUDIO_database.json esistente');
  try{
    if(create){
      fileHandle = await window.showSaveFilePicker({suggestedName:'AUDIO_database.json',
        types:[{description:'Database JSON',accept:{'application/json':['.json']}}]});
      await IDB.set('fileHandle', fileHandle);
      await saveDB();
    }else{
      const [h] = await window.showOpenFilePicker({types:[{description:'Database JSON',accept:{'application/json':['.json']}}]});
      fileHandle=h; await IDB.set('fileHandle', fileHandle);
      const txt = await (await h.getFile()).text();
      DB = JSON.parse(txt); dirty=false;
      route(); toast('Database collegato e caricato');
    }
    renderDbStat();
  }catch(e){ if(e.name!=='AbortError') toast('Operazione annullata'); }
}

/* ============================================================
   Mini-motore XLSX (lettura + scrittura) senza dipendenze.
   - Scrittura: ZIP con metodo STORE (no compressione) + CRC32,
     celle come inlineStr => Excel valido.
   - Lettura: parser ZIP (central directory) + inflate DEFLATE
     (porting di "tinf") + parsing worksheet/sharedStrings.
   ============================================================ */
const XLSX = (function(){

  /* ---------- CRC32 ---------- */
  const CRC_TABLE = (()=>{ const t=new Uint32Array(256);
    for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c = c&1 ? (0xEDB88320 ^ (c>>>1)) : (c>>>1); t[n]=c>>>0; }
    return t; })();
  function crc32(buf){ let c=0xFFFFFFFF; for(let i=0;i<buf.length;i++) c = CRC_TABLE[(c ^ buf[i]) & 0xFF] ^ (c>>>8); return (c ^ 0xFFFFFFFF)>>>0; }

  const enc = new TextEncoder();
  function u16(n){ return [n&0xFF,(n>>>8)&0xFF]; }
  function u32(n){ return [n&0xFF,(n>>>8)&0xFF,(n>>>16)&0xFF,(n>>>24)&0xFF]; }

  /* ---------- ZIP writer (STORE) ---------- */
  function zip(files){ // files: [{name, data:Uint8Array}]
    const chunks=[]; const central=[]; let offset=0;
    for(const f of files){
      const nameBytes = enc.encode(f.name);
      const crc = crc32(f.data);
      const size = f.data.length;
      const local = [].concat(u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0),
        u32(crc), u32(size), u32(size), u16(nameBytes.length), u16(0));
      const localHeader = new Uint8Array(local);
      chunks.push(localHeader, nameBytes, f.data);
      const localLen = localHeader.length + nameBytes.length + f.data.length;
      const cen = [].concat(u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0),
        u32(crc), u32(size), u32(size), u16(nameBytes.length), u16(0), u16(0), u16(0), u16(0),
        u32(0), u32(offset));
      central.push(new Uint8Array(cen), nameBytes);
      offset += localLen;
    }
    let cenSize=0; for(const c of central) cenSize+=c.length;
    const eocd = new Uint8Array([].concat(u32(0x06054b50), u16(0), u16(0),
      u16(files.length), u16(files.length), u32(cenSize), u32(offset), u16(0)));
    const all=[...chunks, ...central, eocd];
    let total=0; for(const a of all) total+=a.length;
    const out=new Uint8Array(total); let p=0;
    for(const a of all){ out.set(a,p); p+=a.length; }
    return out;
  }

  /* ---------- XML helpers ---------- */
  function xmlEsc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c])); }
  function colName(i){ let s=''; i++; while(i>0){ const m=(i-1)%26; s=String.fromCharCode(65+m)+s; i=(i-m-1)/26; } return s; }

  function sheetXml(rows){ // rows: array of array of cell values (strings/numbers)
    let out='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';
    rows.forEach((row,r)=>{
      out+='<row r="'+(r+1)+'">';
      row.forEach((val,c)=>{
        const ref=colName(c)+(r+1);
        if(val===''||val==null){ out+='<c r="'+ref+'"/>'; return; }
        if(typeof val==='number' && isFinite(val)){ out+='<c r="'+ref+'"><v>'+val+'</v></c>'; }
        else { out+='<c r="'+ref+'" t="inlineStr"><is><t xml:space="preserve">'+xmlEsc(val)+'</t></is></c>'; }
      });
      out+='</row>';
    });
    out+='</sheetData></worksheet>';
    return out;
  }

  // sheets: [{name, rows:[[...]]}]
  function build(sheets){
    sheets = sheets.map((s,i)=>({name:(s.name||('Foglio'+(i+1))).slice(0,31).replace(/[\\\/\?\*\[\]:]/g,' '), rows:s.rows}));
    const files=[];
    files.push({name:'[Content_Types].xml', data:enc.encode(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
      '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
      '<Default Extension="xml" ContentType="application/xml"/>'+
      '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+
      sheets.map((s,i)=>'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join('')+
      '</Types>')});
    files.push({name:'_rels/.rels', data:enc.encode(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
      '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>'+
      '</Relationships>')});
    files.push({name:'xl/workbook.xml', data:enc.encode(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+
      sheets.map((s,i)=>'<sheet name="'+xmlEsc(s.name)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>').join('')+
      '</sheets></workbook>')});
    files.push({name:'xl/_rels/workbook.xml.rels', data:enc.encode(
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
      '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
      sheets.map((s,i)=>'<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>').join('')+
      '</Relationships>')});
    sheets.forEach((s,i)=>files.push({name:'xl/worksheets/sheet'+(i+1)+'.xml', data:enc.encode(sheetXml(s.rows))}));
    return zip(files);
  }

  /* ---------- INFLATE (tinf port) ---------- */
  function Tree(){ this.table=new Uint16Array(16); this.trans=new Uint16Array(288); }
  function Data(source){ this.s=source; this.i=0; this.tag=0; this.bitcount=0;
    this.ltree=new Tree(); this.dtree=new Tree(); }
  const sltree=new Tree(), sdtree=new Tree();
  const length_bits=new Uint8Array(30), length_base=new Uint16Array(30),
        dist_bits=new Uint8Array(30), dist_base=new Uint16Array(30);
  const clcidx=new Uint8Array([16,17,18,0,8,7,9,6,10,5,11,4,12,3,13,2,14,1,15]);
  function build_bits_base(bits,base,delta,first){ let i,sum=first;
    for(i=0;i<delta;i++) bits[i]=0;
    for(i=0;i<30-delta;i++) bits[i+delta]=(i/delta)|0;
    for(i=0;i<30;i++){ base[i]=sum; sum+=1<<bits[i]; } }
  function build_fixed_trees(lt,dt){ let i;
    for(i=0;i<7;i++) lt.table[i]=0; lt.table[7]=24; lt.table[8]=152; lt.table[9]=112;
    for(i=0;i<24;i++) lt.trans[i]=256+i;
    for(i=0;i<144;i++) lt.trans[24+i]=i;
    for(i=0;i<8;i++) lt.trans[24+144+i]=280+i;
    for(i=0;i<112;i++) lt.trans[24+144+8+i]=144+i;
    for(i=0;i<5;i++) dt.table[i]=0; dt.table[5]=32;
    for(i=0;i<32;i++) dt.trans[i]=i; }
  function build_tree(t,lengths,off,num){ const offs=new Uint16Array(16); let i,sum=0;
    for(i=0;i<16;i++) t.table[i]=0;
    for(i=0;i<num;i++) t.table[lengths[off+i]]++;
    t.table[0]=0;
    for(i=0;i<16;i++){ offs[i]=sum; sum+=t.table[i]; }
    for(i=0;i<num;i++){ if(lengths[off+i]) t.trans[offs[lengths[off+i]]++]=i; } }
  function getbit(d){ if(!d.bitcount--){ d.tag=d.s[d.i++]; d.bitcount=7; }
    const bit=d.tag&1; d.tag>>>=1; return bit; }
  function read_bits(d,num,base){ if(!num) return base; let val=0;
    while(d.bitcount<24){ d.tag|=d.s[d.i++]<<d.bitcount; d.bitcount+=8; }
    val=d.tag&(0xffff>>>(16-num)); d.tag>>>=num; d.bitcount-=num; return val+base; }
  function decode_symbol(d,t){ let sum=0,cur=0,len=0;
    do{ cur=2*cur+getbit(d); len++; sum+=t.table[len]; cur-=t.table[len]; }while(cur>=0);
    return t.trans[sum+cur]; }
  function decode_trees(d,lt,dt){ const lengths=new Uint8Array(288+32); let i,num,length;
    const hlit=read_bits(d,5,257); const hdist=read_bits(d,5,1); const hclen=read_bits(d,4,4);
    for(i=0;i<19;i++) lengths[i]=0;
    for(i=0;i<hclen;i++){ const clen=read_bits(d,3,0); lengths[clcidx[i]]=clen; }
    build_tree(d.ltree, lengths, 0, 19);
    for(num=0;num<hlit+hdist;){ const sym=decode_symbol(d,d.ltree);
      switch(sym){
        case 16:{ let prev=lengths[num-1]; for(length=read_bits(d,2,3);length;length--) lengths[num++]=prev; break; }
        case 17:{ for(length=read_bits(d,3,3);length;length--) lengths[num++]=0; break; }
        case 18:{ for(length=read_bits(d,7,11);length;length--) lengths[num++]=0; break; }
        default: lengths[num++]=sym; break;
      } }
    build_tree(lt, lengths, 0, hlit); build_tree(dt, lengths, hlit, hdist); }
  function inflate_block_data(d,out,lt,dt){
    for(;;){ let sym=decode_symbol(d,lt);
      if(sym===256) return;
      if(sym<256){ out.push(sym); }
      else{ sym-=257; const length=read_bits(d,length_bits[sym],length_base[sym]);
        const dist=decode_symbol(d,dt); const offs=out.length-read_bits(d,dist_bits[dist],dist_base[dist]);
        for(let i=offs;i<offs+length;i++) out.push(out[i]); } } }
  function inflate_uncompressed(d,out){ let length,invlength;
    while(d.bitcount>8){ d.i--; d.bitcount-=8; }
    length=d.s[d.i+1]; length=256*length+d.s[d.i]; d.i+=4; // skip length + ~length
    for(let i=length;i;i--) out.push(d.s[d.i++]);
    d.bitcount=0; }
  let treesReady=false;
  function initTrees(){ if(treesReady) return; build_fixed_trees(sltree,sdtree);
    build_bits_base(length_bits,length_base,4,3); build_bits_base(dist_bits,dist_base,2,1);
    length_bits[28]=0; length_base[28]=258; treesReady=true; }
  function inflateRaw(source){ initTrees();
    const d=new Data(source); const out=[]; let bfinal,btype; const LIM=source.length;
    do{
      if(d.i>LIM+8) throw new Error('inflate: stream troncato');
      bfinal=getbit(d); btype=read_bits(d,2,0);
      if(btype===0) inflate_uncompressed(d,out);
      else if(btype===1) inflate_block_data(d,out,sltree,sdtree);
      else if(btype===2){ decode_trees(d,d.ltree,d.dtree); inflate_block_data(d,out,d.ltree,d.dtree); }
      else throw new Error('inflate: blocco non valido');
    }while(!bfinal);
    return new Uint8Array(out); }

  // Decompressione preferendo l'API nativa del browser (Edge/Chrome), fallback JS.
  async function inflateRawAsync(source){
    if(typeof DecompressionStream!=='undefined'){
      try{
        const ds=new DecompressionStream('deflate-raw');
        const stream=new Blob([source]).stream().pipeThrough(ds);
        return new Uint8Array(await new Response(stream).arrayBuffer());
      }catch(e){ /* fallback */ }
    }
    return inflateRaw(source);
  }

  /* ---------- ZIP reader ---------- */
  function readU16(b,o){ return b[o]|(b[o+1]<<8); }
  function readU32(b,o){ return (b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0; }
  async function unzip(bytes){ // returns {name: Uint8Array}
    // find EOCD
    let eocd=-1;
    for(let i=bytes.length-22;i>=0;i--){ if(readU32(bytes,i)===0x06054b50){ eocd=i; break; } }
    if(eocd<0) throw new Error('ZIP non valido');
    const cdCount=readU16(bytes,eocd+10);
    let p=readU32(bytes,eocd+16);
    const out={};
    for(let n=0;n<cdCount;n++){
      if(readU32(bytes,p)!==0x02014b50) break;
      const method=readU16(bytes,p+10);
      const compSize=readU32(bytes,p+20);
      const nameLen=readU16(bytes,p+28);
      const extraLen=readU16(bytes,p+30);
      const commentLen=readU16(bytes,p+32);
      const localOff=readU32(bytes,p+42);
      const name=new TextDecoder().decode(bytes.subarray(p+46,p+46+nameLen));
      // local header
      const lNameLen=readU16(bytes,localOff+26);
      const lExtraLen=readU16(bytes,localOff+28);
      const dataStart=localOff+30+lNameLen+lExtraLen;
      const comp=bytes.subarray(dataStart,dataStart+compSize);
      let data;
      if(method===0) data=comp;
      else if(method===8) data=await inflateRawAsync(comp);
      else throw new Error('Metodo compressione non supportato: '+method);
      out[name]=data;
      p+=46+nameLen+extraLen+commentLen;
    }
    return out;
  }

  /* ---------- XLSX parse ---------- */
  function parseSharedStrings(xml){
    const res=[]; if(!xml) return res;
    const re=/<si>([\s\S]*?)<\/si>/g; let m;
    while((m=re.exec(xml))){
      let s=''; const tre=/<t[^>]*>([\s\S]*?)<\/t>/g; let tm;
      while((tm=tre.exec(m[1]))) s+=tm[1];
      res.push(unescapeXml(s));
    }
    return res;
  }
  function unescapeXml(s){ return s.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&#(\d+);/g,(_,d)=>String.fromCharCode(+d)).replace(/&amp;/g,'&'); }
  function colToIndex(ref){ const m=/^([A-Z]+)/.exec(ref); let c=0; for(const ch of m[1]) c=c*26+(ch.charCodeAt(0)-64); return c-1; }
  function parseSheet(xml, shared){
    const rows=[]; const rowRe=/<row[^>]*>([\s\S]*?)<\/row>/g; let rm;
    while((rm=rowRe.exec(xml))){
      const cells=[]; const cRe=/<c\s+([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g; let cm;
      while((cm=cRe.exec(rm[1]))){
        const attrs=cm[1]; const inner=cm[2]||'';
        const refM=/r="([A-Z]+\d+)"/.exec(attrs); const ci=refM?colToIndex(refM[1]):cells.length;
        const tM=/t="([^"]+)"/.exec(attrs); const type=tM?tM[1]:'n';
        let val='';
        if(type==='s'){ const vM=/<v>([\s\S]*?)<\/v>/.exec(inner); if(vM) val=shared[+vM[1]]||''; }
        else if(type==='inlineStr'){ let s=''; const tre=/<t[^>]*>([\s\S]*?)<\/t>/g; let tm; while((tm=tre.exec(inner))) s+=tm[1]; val=unescapeXml(s); }
        else if(type==='str'){ const vM=/<v>([\s\S]*?)<\/v>/.exec(inner); if(vM) val=unescapeXml(vM[1]); }
        else { const vM=/<v>([\s\S]*?)<\/v>/.exec(inner); if(vM) val=vM[1]; }
        cells[ci]=val;
      }
      for(let i=0;i<cells.length;i++) if(cells[i]==null) cells[i]='';
      rows.push(cells);
    }
    return rows;
  }
  function firstSheetPath(zipFiles){
    // resolve first sheet target from workbook rels; fallback to sheet1
    const names=Object.keys(zipFiles).filter(n=>/^xl\/worksheets\/sheet\d+\.xml$/.test(n))
      .sort((a,b)=>(+a.match(/(\d+)/)[1])-(+b.match(/(\d+)/)[1]));
    return names[0];
  }
  // read: returns {rows} for first sheet
  async function read(bytes){
    const files=await unzip(bytes);
    const shared=parseSharedStrings(files['xl/sharedStrings.xml']?new TextDecoder().decode(files['xl/sharedStrings.xml']):'');
    const sheetPath=firstSheetPath(files);
    if(!sheetPath) throw new Error('Nessun foglio trovato');
    const xml=new TextDecoder().decode(files[sheetPath]);
    const rows=parseSheet(xml, shared);
    return {rows};
  }
  // mappa nome foglio -> percorso worksheet (via workbook.xml + rels)
  function sheetMap(files){
    const dec=b=>b?new TextDecoder().decode(b):'';
    const rels=dec(files['xl/_rels/workbook.xml.rels']);
    const relMap={}; let rm; const relRe=/<Relationship\b[^>]*>/g;
    while((rm=relRe.exec(rels))){ const tag=rm[0];
      const id=/Id="([^"]+)"/.exec(tag), tg=/Target="([^"]+)"/.exec(tag);
      if(id&&tg){ let t=tg[1].replace(/^\/xl\//,'').replace(/^\.\//,''); relMap[id[1]]= t.startsWith('xl/')?t:('xl/'+t.replace(/^\/?/,'')); }
    }
    const wb=dec(files['xl/workbook.xml']); const list=[]; let sm; const sRe=/<sheet\b[^>]*>/g;
    while((sm=sRe.exec(wb))){ const tag=sm[0];
      const nm=/name="([^"]*)"/.exec(tag), rid=/r:id="([^"]+)"/.exec(tag);
      if(nm){ list.push({name:unescapeXml(nm[1]), path: rid?relMap[rid[1]]:null}); }
    }
    return list;
  }
  // elenca i nomi dei fogli
  async function sheetNames(bytes){ return sheetMap(await unzip(bytes)).map(s=>s.name); }
  // legge un foglio per NOME (ritorna {rows}); se name assente usa il primo
  async function readSheet(bytes, name){
    const files=await unzip(bytes);
    const shared=parseSharedStrings(files['xl/sharedStrings.xml']?new TextDecoder().decode(files['xl/sharedStrings.xml']):'');
    const map=sheetMap(files);
    let entry = name? map.find(s=>String(s.name).trim().toLowerCase()===String(name).trim().toLowerCase()) : map[0];
    let path = entry && entry.path && files[entry.path] ? entry.path : firstSheetPath(files);
    if(!path||!files[path]) throw new Error('Foglio non trovato: '+name);
    return {rows:parseSheet(new TextDecoder().decode(files[path]), shared)};
  }

  return { build, read, readSheet, sheetNames, unzip, inflateRaw };
})();

/* Parser log Cisco (show int status / description / mac-address-table / cdp)
   Riempie SOLO i campi vuoti delle porte switch (non sovrascrive i dati Excel). */
const SWLOG = (function(){
  function normId(s){ return String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,''); }
  function macFmt(raw){ // "5006.ab08.d360" o "5006AB08D360" -> "50:06:AB:08:D3:60"
    const h=String(raw||'').replace(/[^0-9a-fA-F]/g,'').toUpperCase();
    if(h.length!==12) return String(raw||'').toUpperCase();
    return h.match(/.{2}/g).join(':');
  }
  // interfaccia -> {membro, porta} solo per Gi<m>/0/<p>
  function parseIface(name){
    const m=/^(?:Gi|Gig|GigabitEthernet)\s?(\d+)\/(\d+)\/(\d+)$/i.exec(String(name).trim().replace(/\s+/,''));
    if(!m) return null;
    return {membro:+m[1], slot:+m[2], porta:+m[3]};
  }
  function parseIfaceLoose(name){ // per CDP "Gig 2/0/5"
    const m=/(\d+)\/(\d+)\/(\d+)/.exec(String(name));
    if(!m) return null; return {membro:+m[1], slot:+m[2], porta:+m[3]};
  }

  function parse(text){
    const lines=text.split(/\r?\n/);
    const swName=(text.match(/^\s*(SW-VE-[A-Z0-9-]+)/m)||[])[1] || (lines[0]||'').replace(/_.*/,'').trim();
    const ports={}; // key "m/p" -> {membro,porta,name,vlan,status,speed,type,desc,macs:[],cdp:null}
    function P(m,p){ const k=m+'/'+p; return ports[k]||(ports[k]={membro:m,porta:p,name:'',vlan:'',status:'',speed:'',type:'',desc:'',macs:[],cdp:null}); }

    let sec='';
    for(let i=0;i<lines.length;i++){
      const ln=lines[i];
      if(/#show int status/i.test(ln)){ sec='status'; continue; }
      if(/#show int description/i.test(ln)){ sec='desc'; continue; }
      if(/#sh(ow)? mac address-table/i.test(ln)){ sec='mac'; continue; }
      if(/#sh(ow)? cdp n/i.test(ln)){ sec='cdp'; continue; }
      if(/#(exi|exit|conf|wr)/i.test(ln)){ sec=''; continue; }

      if(sec==='status'){
        // Gi1/0/1  Name(può contenere spazi)  Status  Vlan  Duplex  Speed  Type
        // Ancoriamo sulla parola chiave di stato (il Name può riempire l'intera colonna).
        const m=/^(Gi\d+\/\d+\/\d+)\s+(.*?)\s+(connected|notconnect|disabled|err-disabled|monitoring)\s+(\S+)\s+(\S+)\s+(\S+)\s+(.+?)\s*$/.exec(ln);
        if(m){ const intf=parseIface(m[1]); if(intf){ const pt=P(intf.membro,intf.porta);
          pt.name=m[2].trim(); pt.status=m[3]; pt.vlan=m[4]; pt.speed=m[6]; pt.type=m[7].trim(); } }
      } else if(sec==='desc'){
        // Gi1/0/1   up  up  Description...
        const m=/^(Gi\d+\/\d+\/\d+)\s+(\S+(?:\s\S+)?)\s+(up|down)\s*(.*)$/.exec(ln);
        if(m){ const intf=parseIface(m[1]); if(intf){ const pt=P(intf.membro,intf.porta); const d=(m[4]||'').trim(); if(d) pt.desc=d; } }
      } else if(sec==='mac'){
        // vlan  mac  type  iface
        const m=/^\s*(\S+)\s+([0-9a-fA-F]{4}\.[0-9a-fA-F]{4}\.[0-9a-fA-F]{4})\s+(STATIC|DYNAMIC)\s+(Gi\d+\/\d+\/\d+)/.exec(ln);
        if(m){ const intf=parseIface(m[4]); if(intf){ const pt=P(intf.membro,intf.porta);
          pt.macs.push({vlan:m[1], mac:m[2], type:m[3]}); } }
      } else if(sec==='cdp'){
        // Device ID puo' stare su riga separata dalla local intrfce
        const m=/^(\S.*?)\s{2,}(Gig?\s?\d+\/\d+\/\d+)\s+\d+\s+([RTBSHIPrDCM ]+?)\s+(\S+)\s+(\S.*)$/.exec(ln);
        let dev,ifc,cap,plat;
        if(m){ dev=m[1].trim(); ifc=m[2]; cap=m[3].trim(); plat=m[4]; }
        else{
          // Device ID su riga a sé, poi riga con "  Gig x/y/z  ..."
          const m2=/^\s+(Gig?\s?\d+\/\d+\/\d+)\s+\d+\s+([RTBSHIPrDCM ]+?)\s+(\S+)\s+(\S.*)$/.exec(ln);
          if(m2){ dev=(lines[i-1]||'').trim(); ifc=m2[1]; cap=m2[2].trim(); plat=m2[3]; }
        }
        if(ifc){ const intf=parseIfaceLoose(ifc); if(intf){ const pt=P(intf.membro,intf.porta);
          pt.cdp={device:dev, cap, plat}; } }
      }
    }
    return {swName, swNorm:normId(swName), ports};
  }

  // sceglie il MAC da mettere in porta (dal Device ID CDP se telefono, altrimenti mac-table)
  function pickMac(pt){
    const dev=(pt.cdp && pt.cdp.device)||'';
    let m=/^SEP([0-9A-Fa-f]{12})$/.exec(dev); if(m) return macFmt(m[1]);
    m=/^T21P_E2([0-9A-Fa-f]{12})$/i.exec(dev); if(m) return macFmt(m[1]);
    const macs=[...new Set(pt.macs.map(x=>x.mac))];
    if(macs.length===0 || macs.length>6) return ''; // 0 o uplink/trunk (troppi)
    return macs.map(macFmt).join(' ');
  }
  function deviceLabel(pt){
    const dev=(pt.cdp && pt.cdp.device)||''; if(!dev) return '';
    const plat=(pt.cdp && pt.cdp.plat)||'';
    if(/^SEP[0-9A-F]{12}$/i.test(dev)) return 'Telefono '+dev;
    if(/^T21P/i.test(dev)) return 'Telefono Yealink';
    if(/^AP-|AIR|LAP|CAP/i.test(dev+plat)) return 'AP '+dev.replace(/\.servizi.*/i,'');
    if(/^SW-VE|^RT-VE/i.test(dev)) return 'Uplink '+dev.replace(/\.network.*/i,'');
    return dev.replace(/\.(servizi|network)\.rai\.it.*/i,'');
  }
  function buildNote(pt){
    const bits=[];
    if(pt.status) bits.push(pt.status);
    if(pt.speed && /\d/.test(pt.speed)) bits.push(pt.speed.replace('a-',''));
    const dl=deviceLabel(pt); if(dl) bits.push(dl);
    return bits.join(' · ');
  }

  // applica i log al DB: riempie solo campi vuoti. Ritorna statistiche.
  function apply(DB, parsedLogs, opts){
    opts=opts||{};
    const stats={switchTrovati:0, switchNonTrovati:[], porteAggiornate:0, campiScritti:0, dettaglio:[]};
    for(const log of parsedLogs){
      // trova gli switch del DB con prefisso normalizzato = log.swNorm, in ordine di array (= membri)
      const membri=DB.switches.filter(s=>normId(s.nome).startsWith(log.swNorm) && normId(s.nome).length>=log.swNorm.length);
      if(!membri.length){ stats.switchNonTrovati.push(log.swName); continue; }
      stats.switchTrovati++;
      let swPorte=0, swCampi=0;
      for(const [k,pt] of Object.entries(log.ports)){
        const sw=membri[pt.membro-1]; if(!sw) continue;
        const porta=sw.porte.find(p=>p.numero===pt.porta); if(!porta) continue;
        let touched=false;
        const desc=pt.desc || pt.name;
        const setIf=(campo,val)=>{ if(val && !String(porta[campo]||'').trim()){ porta[campo]=val; swCampi++; stats.campiScritti++; touched=true; } };
        setIf('descrizione', desc);
        setIf('vlan', pt.vlan && pt.vlan!=='1' ? pt.vlan : (pt.vlan==='1'?'':''));
        setIf('mac', pickMac(pt));
        setIf('note', buildNote(pt));
        if(touched){ swPorte++; stats.porteAggiornate++; }
      }
      stats.dettaglio.push({switch:membri.map(m=>m.nome).join(' + '), porte:swPorte, campi:swCampi});
    }
    return stats;
  }

  // applica il log a UN SOLO switch, usando le porte del membro indicato (default 1). Riempi-solo-vuoti.
  function applyOne(sw, parsedLog, member, overwrite){
    member=member||1; const stats={porte:0, campi:0};
    for(const pt of Object.values(parsedLog.ports)){
      if(pt.membro!==member) continue;
      const porta=sw.porte.find(p=>p.numero===pt.porta); if(!porta) continue;
      let touched=false;
      const desc=pt.desc || pt.name;
      const setIf=(campo,val)=>{ if(val && (overwrite || !String(porta[campo]||'').trim())){ porta[campo]=val; stats.campi++; touched=true; } };
      setIf('descrizione', desc);
      setIf('vlan', pt.vlan && pt.vlan!=='1' ? pt.vlan : '');
      setIf('mac', pickMac(pt));
      setIf('note', buildNote(pt));
      if(touched) stats.porte++;
    }
    return stats;
  }

  return { parse, apply, applyOne, normId };
})();



/* -------------------- Utilità UI -------------------- */
const $ = s=>document.querySelector(s);
function el(tag, attrs={}, ...kids){
  const e=document.createElement(tag);
  for(const k in attrs){ if(k==='class')e.className=attrs[k]; else if(k==='html')e.innerHTML=attrs[k]; else if(k.startsWith('on'))e.addEventListener(k.slice(2),attrs[k]); else if(attrs[k]!=null)e.setAttribute(k,attrs[k]); }
  for(const kid of kids.flat()){ if(kid==null)continue; e.append(kid.nodeType?kid:document.createTextNode(kid)); }
  return e;
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastTimer;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }
let modalOpenedAt=0;
function openModal(node,wide){ const m=$('#modal'); m.className='modal'+(wide?' wide':''); m.innerHTML=''; m.append(node); $('#overlay').classList.add('show'); modalOpenedAt=Date.now(); }
function closeModal(){ $('#overlay').classList.remove('show'); }
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay' && Date.now()-modalOpenedAt>300) closeModal(); });

function renderDbStat(){
  const s=$('#dbstat'), t=$('#dbstatText');
  if(fileHandle){ s.classList.add('ok'); t.innerHTML='File: <b>'+esc(fileHandle.name)+'</b>'+(dirty?' · <span style="color:#f59e0b">da salvare</span>':' · salvato'); }
  else if(!hasFS){ s.classList.remove('ok'); t.innerHTML='Memoria browser'+(dirty?' · da salvare':' · ok'); }
  else { s.classList.remove('ok'); t.innerHTML='Nessuna cartella collegata'+(dirty?' · <span style="color:#f59e0b">non salvato</span>':''); }
}

/* -------------------- helper modello -------------------- */
function newCh(o){ return Object.assign({_id:uid('ch_'),canale:'',macchina:'',ch:'',ms:'',patch:'',note:'',slot:''}, o||{}); }
// evidenziazione temporanea della porta al momento dell'apertura del pannello
let pendingPatchHL=null;
// risolve un riferimento patch di un canale nel pannello + porta specifica.
// Il valore memorizzato è del tipo «Nome Pannello · cavo · segnale»: si individua
// PRIMA il pannello (per nome, prefisso più lungo), POI la porta al suo interno.
function resolvePatch(u, text){
  text=String(text||'').trim(); if(!text) return null; const low=text.toLowerCase();
  const pats=u.patch||[];
  // 1) pannello il cui nome corrisponde/è prefisso del testo (match più lungo)
  let panel=null, panelLen=-1;
  for(const pp of pats){ const n=String(pp.nome||'').trim().toLowerCase(); if(!n) continue;
    if(low===n || low.startsWith(n)){ if(n.length>panelLen){ panel=pp; panelLen=n.length; } } }
  // 1b) se nessun prefisso, pannello il cui nome è contenuto nel testo (o viceversa)
  if(!panel){ for(const pp of pats){ const n=String(pp.nome||'').trim().toLowerCase(); if(n && (low.includes(n)||n.includes(low))){ if(n.length>panelLen){ panel=pp; panelLen=n.length; } } } }
  if(panel){
    let port=null;
    for(const po of (panel.porte||[])){
      const comp=(String(panel.nome||'')+(po.cavo?(' · '+po.cavo):(po.numero?(' · '+po.numero):''))+(po.segnale?(' · '+po.segnale):'')).toLowerCase();
      if(comp===low){ port=po; break; } }
    if(!port){ for(const po of (panel.porte||[])){ if([po.cavo,po.segnale,po.numero].some(v=>{ v=String(v||'').trim().toLowerCase(); return v && (low===v || low.endsWith(' '+v) || low.includes(' '+v+' ') || low.includes('· '+v)); })){ port=po; break; } } }
    return {pp:panel, po:port};
  }
  // 2) ultima risorsa: porta con cavo/segnale esattamente uguale al testo
  for(const pp of pats) for(const po of (pp.porte||[])){ if([po.cavo,po.segnale].some(v=>{ v=String(v||'').trim().toLowerCase(); return v && low===v; })) return {pp,po}; }
  return null;
}
// apre il pannello patch della stanza collegato a un canale, evidenziando la porta
function openPatchFrom(u, text){
  if(!String(text||'').trim()){ toast('Nessuna patch indicata in questo canale'); return; }
  const r=resolvePatch(u,text);
  if(!r){ toast('Patch «'+String(text).trim()+'» non trovata nella stanza'); return; }
  pendingPatchHL = r.po? {patchId:r.pp._id, portId:r.po._id} : null;
  location.hash='patch/'+u._id+'/'+r.pp._id;
}
// destinazioni collegabili di una stanza (Patch, Pannelli, Box) -> [{kind, obj, label}]
function destPanels(u, excludeId){
  const out=[];
  for(const p of (u.pannelli||[])){ if(p._id===excludeId) continue; out.push({kind:'pannello',obj:p,label:'Pannello'}); }
  for(const p of (u.patch||[])){ if(p._id===excludeId) continue; out.push({kind:'patch',obj:p,label:'Patch'}); }
  for(const p of (u.box||[])){ if(p._id===excludeId) continue; out.push({kind:'box',obj:p,label:'Box'}); }
  return out;
}
// trova una destinazione tra Patch, Pannelli e Box, dato il nome -> {kind:'patch'|'pannello'|'box', obj}
function findDestPanel(u, name, excludeId){
  name=String(name||'').trim(); if(!name) return null; const low=name.toLowerCase();
  const cands=destPanels(u, excludeId);
  for(const c of cands){ if(String(c.obj.nome||'').trim().toLowerCase()===low) return c; } // corrispondenza esatta
  let best=null, bestLen=-1;
  for(const c of cands){ const n=String(c.obj.nome||'').trim().toLowerCase();
    if(n && (low.startsWith(n)||n.startsWith(low)||low.includes(n)||n.includes(low))){ if(n.length>bestLen){ best=c; bestLen=n.length; } } }
  return best;
}
// individua la porta/coppia della destinazione alla "posizione" indicata (per N°, poi ordinale, poi segnale)
function findPanelPortByPos(panel, pos, segnale){
  const porte=panel.porte||panel.coppie||[]; pos=String(pos==null?'':pos).trim();
  if(pos){ let p=porte.find(x=>String(x.numero||'').trim()===pos); if(p) return p;
    const idx=parseInt(pos,10); if(idx>=1&&idx<=porte.length) return porte[idx-1]; }
  if(segnale){ const s=String(segnale).trim().toLowerCase(); if(s){ const p=porte.find(x=>String(x.segnale||'').trim().toLowerCase()===s); if(p) return p; } }
  return null;
}
// apre la destinazione (patch/pannello/box) indicata, evidenziando la posizione
function openDest(u, srcId, name, pos, segnale){
  name=String(name||'').trim();
  if(!name){ toast('Nessuna destinazione indicata'); return; }
  const d=findDestPanel(u, name, srcId);
  if(!d){ toast('Destinazione «'+name+'» non trovata nella stanza'); return; }
  const port=findPanelPortByPos(d.obj, pos, segnale);
  pendingPatchHL = port? {patchId:d.obj._id, portId:port._id} : null;
  location.hash=(d.kind==='patch'?'patch/':d.kind==='box'?'box/':'pannello/')+u._id+'/'+d.obj._id;
}
// coppia del box -> destinazione
function openBoxDest(u, box, cp){ openDest(u, box&&box._id, cp.destPannello, cp.destPosizione, cp.segnale); }
// porta del pannello -> destinazione (campo «Patch» + «Posizione patch»)
function openPnlDest(u, pl, po){ openDest(u, pl&&pl._id, po.provenienza, po.numero, po.segnale); }

function newScheda(dir,nome,tipo,canali){ return {_id:uid('sch_'),nome:nome||(DIR_META[dir].label),dir:dir,tipo:tipo||'analogico',canali:canali||[]}; }
function findUnita(id){ return (DB.unita||[]).find(u=>u._id===id)||null; }
function findMacchina(uid_, mid){ const u=findUnita(uid_); return u?{u, m:(u.macchine||[]).find(x=>x._id===mid)||null}:{u:null,m:null}; }
function findScheda(uid_, mid, sid){ const {u,m}=findMacchina(uid_,mid); return {u,m, s:m?(m.schede||[]).find(x=>x._id===sid)||null:null}; }
// indice canale-id -> {u,m,s,c} (O(1)); ricostruito quando i dati cambiano (vedi markDirty/route)
let _chIdx=null;
function chIndex(){ if(_chIdx) return _chIdx; const map=new Map();
  for(const u of (DB.unita||[])) for(const m of (u.macchine||[])) for(const s of (m.schede||[])) for(const c of (s.canali||[])) map.set(c._id,{u,m,s,c});
  _chIdx=map; return map; }
function invalidateChIndex(){ _chIdx=null; }
function chFind(id){ return id? (chIndex().get(id)||null) : null; }
function chLabel(c){ if(!c)return ''; const n=c.macchina||c.canale||''; return n+(c.ch?(' '+c.ch):''); }
function chLabelFull(id){ const f=chFind(id); if(!f)return ''; return f.u.nome+' · '+f.m.nome+' · '+f.s.nome+' · '+chLabel(f.c); }
// gruppi per il Quadro Incroci: una scheda = un gruppo
function schedeGroups(dir){ const out=[];
  for(const u of (DB.unita||[])) for(const m of (u.macchine||[])) for(const s of (m.schede||[])){
    if(s.dir!==dir) continue; const canali=s.canali||[]; if(!canali.length) continue;
    out.push({id:s._id, nome:s.nome, unitNome:u.nome, macNome:m.nome, tipo:s.tipo||'', canali}); }
  return out; }
// etichetta del raggruppamento nel Quadro Incroci: STANZA · MACCHINA · scheda
function grpLabel(g){ return (g.unitNome? (g.unitNome+' · '):'')+(g.macNome? (g.macNome+' · '):'')+g.nome; }
function schedeOf(m,dir){ return (m.schede||[]).filter(s=>s.dir===dir); }

function hexRgba(hex,a){ hex=String(hex||'').replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const n=parseInt(hex,16); if(isNaN(n))return 'transparent'; return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')'; }

function incrociData(){

  bar.append(

    el('div',{class:'grpbtn'}, el('button',{onclick:()=>expandAll('in',true)},'▸ espandi'), el('button',{onclick:()=>expandAll('in',false)},'▾ comprimi')),
    qIn,
    el('span',{class:'xp-stat',style:'margin-left:8px'},'Uscite:'), tipoSel('out'),
    el('div',{class:'grpbtn'}, el('button',{onclick:()=>expandAll('out',true)},'▸ espandi'), el('button',{onclick:()=>expandAll('out',false)},'▾ comprimi')),
    qOut, onlyA,
    el('div',{class:'sp',style:'flex:1'}),
    el('button',{class:'btn sm',onclick:exportIncroci},'⤓ Excel'),
    el('button',{class:'btn sm',onclick:printIncroci},'🖨 Stampa'),
    el('button',{class:'btn sm danger',onclick:()=>{ if(confirm('Azzerare TUTTI gli incroci attivi?')){ DB.incroci={}; markDirty(); render(); toast('Incroci azzerati'); } }},'✕ Azzera')
  );
  c.append(bar);
  const leg=el('div',{class:'legend',style:'flex-wrap:wrap'}); leg.append(el('span',{},'Tipologie:'));
  for(const t of TIPOLOGIE) leg.append(el('span',{style:'display:flex;align-items:center;gap:5px'},
    el('span',{style:'display:inline-block;width:10px;height:10px;border-radius:50%;background:'+t.color}), t.label));
  c.append(leg);
  c.append(el('div',{style:'margin-bottom:10px'},stat));
  const scroll=el('div',{class:'xp-scroll'}); c.append(scroll);

  function render(){ buildNav(); upStat(); scroll.innerHTML=''; scroll.append(buildMatrix()); }
  function inGroupsVis(){ return schedeGroups('in').filter(g=>grpMatch(g,xpUI.qIn) && (!xpUI.tipoIn||g.tipo===xpUI.tipoIn)); }
  function outGroupsVis(){ return schedeGroups('out').filter(g=>grpMatch(g,xpUI.qOut) && (!xpUI.tipoOut||g.tipo===xpUI.tipoOut)); }
  function inChansVis(g){ return g.canali.filter(c=>!xpUI.qIn || chMatch(c,xpUI.qIn) || g.nome.toLowerCase().includes(xpUI.qIn.toLowerCase())); }
  function outChansVis(g){ let cs=g.canali.filter(c=>!xpUI.qOut || chMatch(c,xpUI.qOut) || g.nome.toLowerCase().includes(xpUI.qOut.toLowerCase()));
    if(xpUI.onlyActive){ const used=new Set(Object.values(DB.incroci)); cs=cs.filter(c=>used.has(c._id)); } return cs; }
  // incroci = { idIngresso: idUscita } → un'uscita può alimentare più ingressi;
  // ogni ingresso riceve una sola uscita. Conta gli ingressi (di inIds) instradati verso outIdSet.
  function countBetween(outIdSet, inIds){ let n=0; for(const iid of inIds){ const o=DB.incroci[iid]; if(o&&outIdSet.has(o)) n++; } return n; }

  function buildMatrix(){
    const inGroups=inGroupsVis(), outGroups=outGroupsVis();
    // mappa uscita -> ingressi che la ricevono (per conteggi ed etichette)
    const srcByOut={}; for(const iid in DB.incroci){ const o=DB.incroci[iid]; if(!o)continue; (srcByOut[o]=srcByOut[o]||[]).push(iid); }
    const cols=[];
    for(const g of inGroups){ if(xpUI.expIn.has(g.id)){ for(const ch of inChansVis(g)) cols.push({type:'ch',g,ch,id:ch._id}); } else cols.push({type:'agg',g}); }
    const table=el('table',{class:'xp'});
    const thead=el('thead'); const rDev=el('tr'); const rCh=el('tr');
    rDev.append(el('th',{class:'corner',rowspan:'2',html:'<b>USCITE \\ INGRESSI</b><small>un\'uscita → più ingressi · clic incrocio = instrada</small>'}));
    for(const g of inGroups){
      const exp=xpUI.expIn.has(g.id);
      const cc=g.canali.filter(c=>DB.incroci[c._id]).length; // ingressi instradati (max 1 uscita cad.)
      if(exp){
        const chans=inChansVis(g); const span=Math.max(chans.length,1);
        rDev.append(el('th',{class:'dev',colspan:String(span),'data-g':g.id,'data-ing':g.id,title:grpLabel(g)+' · '+tipoLabel(g.tipo),style:'border-bottom-color:'+tipoColor(g.tipo)},
          tipoDot(g.tipo),'▾ '+grpLabel(g)+' ', el('span',{class:'cc'},cc?('('+cc+')'):'')));
        if(!chans.length) rCh.append(el('th',{class:'ch'}));
        for(const ch of chans){ const num=g.canali.indexOf(ch)+1;
          rCh.append(el('th',{class:'ch','data-in':ch._id,title:'#'+num+' · '+grpLabel(g)+' · '+chLabel(ch)}, el('div',{},'#'+num+' '+(chLabel(ch)||'—')))); }
      } else {
        rDev.append(el('th',{class:'devcol',rowspan:'2','data-g':g.id,title:grpLabel(g)+' · '+tipoLabel(g.tipo)+' — clic per espandere',style:'border-bottom-color:'+tipoColor(g.tipo)},
          el('div',{}, tipoDot(g.tipo),'▸ '+grpLabel(g)+(cc?(' ('+cc+')'):''))));
      }
    }
    thead.append(rDev,rCh); table.append(thead);
    const tbody=el('tbody');
    for(const g of outGroups){
      const exp=xpUI.expOut.has(g.id); const outChans=exp?outChansVis(g):[];
      const trDev=el('tr',{class:'devrow'});
      const cc=g.canali.reduce((a,oc)=>a+((srcByOut[oc._id]||[]).length),0); // ingressi alimentati da questa scheda
      trDev.append(el('th',{'data-togglout':g.id,'data-outg':g.id,title:grpLabel(g)+' · '+tipoLabel(g.tipo),style:'border-top-color:'+tipoColor(g.tipo)},
        tipoDot(g.tipo),(exp?'▾ ':'▸ ')+grpLabel(g)+' ', el('span',{class:'cc'},cc?('('+cc+')'):'')));
      const outSet=new Set(g.canali.map(oc=>oc._id));
      for(const col of cols){
        if(col.type==='ch'){ trDev.append(aggCell(countBetween(outSet,[col.id]),{expout:g.id,outg:g.id,inch:col.id})); }
        else { trDev.append(aggCell(countBetween(outSet,col.g.canali.map(ic=>ic._id)),{expout:g.id,expin:col.g.id,outg:g.id,ing:col.g.id})); }
      }
      tbody.append(trDev);
      for(const oc of outChans){
        const oid=oc._id; const nSrc=(srcByOut[oid]||[]).length; const onum=g.canali.indexOf(oc)+1; const tr=el('tr');
        tr.append(el('td',{class:'rowlab','data-out':oid,title:'#'+onum+' · '+grpLabel(g)+' · '+chLabel(oc)},
          el('span',{style:'color:var(--muted);font-weight:700;margin-right:4px'},'#'+onum), el('span',{class:'lr'},oc.ch||''), (oc.macchina||oc.canale||'—'),
          el('span',{class:'src'}, nSrc?(' ▸ '+nSrc+' ing.'):'')));
        for(const col of cols){
          if(col.type==='ch'){ tr.append(el('td',{class:'xp'+(DB.incroci[col.id]===oid?' on':''),'data-out':oid,'data-in':col.id})); }
          else { tr.append(aggCell(countBetween(new Set([oid]),col.g.canali.map(ic=>ic._id)),{expin:col.g.id})); }
        }
        tbody.append(tr);
      }
    }
    table.append(tbody);
    // delega eventi: un solo handler invece di migliaia di closure per cella
    table.addEventListener('click',e=>{ const cell=e.target.closest('th,td'); if(!cell)return; const d=cell.dataset, cl=cell.classList;
      if(cl.contains('xp')){ if(d.out&&d.in) toggleXP(d.out,d.in); return; }
      if(cl.contains('agg')){ if(d.expout)xpUI.expOut.add(d.expout); if(d.expin)xpUI.expIn.add(d.expin); if(d.expout||d.expin)render(); return; }
      if(cl.contains('rowlab')){ if(d.out) highlightRow(d.out); return; }
      if(cl.contains('dev')){ if(d.g){ xpUI.expIn.delete(d.g); render(); } return; }
      if(cl.contains('devcol')){ if(d.g){ xpUI.expIn.add(d.g); render(); } return; }
      if(d.togglout){ (xpUI.expOut.has(d.togglout)?xpUI.expOut.delete(d.togglout):xpUI.expOut.add(d.togglout)); render(); return; }
      if(cl.contains('ch')&&d.in){ highlightCol(d.in); return; }
    });
    return table;
  }
  function aggCell(n,attrs){ const td=el('td',{class:'agg'+(n?' has':'')}, n?String(n):'·'); if(attrs) for(const k in attrs){ if(attrs[k]!=null) td.dataset[k]=attrs[k]; } return td; }
  // instrada l'uscita oid verso l'ingresso inId (ogni ingresso ha una sola uscita).
  // Aggiornamento MIRATO del DOM (niente re-render dell'intera matrice).
  function toggleXP(oid,inId){
    const prevOut = DB.incroci[inId]||null;
    if(DB.incroci[inId]===oid) delete DB.incroci[inId]; else DB.incroci[inId]=oid;
    markDirty();
    const nowOut = DB.incroci[inId]||null;
    const q=s=>scroll.querySelector(s), qa=s=>scroll.querySelectorAll(s);
    // 1) pallini nella colonna dell'ingresso
    qa('td.xp[data-in="'+cssq(inId)+'"].on').forEach(td=>td.classList.remove('on'));
    if(nowOut){ const t=q('td.xp[data-in="'+cssq(inId)+'"][data-out="'+cssq(nowOut)+'"]'); if(t)t.classList.add('on'); }
    const incE=Object.entries(DB.incroci);
    const nIntoOut=id=>incE.reduce((a,kv)=>a+(kv[1]===id?1:0),0);
    // 2) etichette righe uscita interessate
    for(const outid of [prevOut,oid]){ if(!outid)continue; const sp=q('td.rowlab[data-out="'+cssq(outid)+'"] .src'); if(sp){ const n=nIntoOut(outid); sp.textContent=n?(' ▸ '+n+' ing.'):''; } }
    // 3) badge scheda-uscita + cella devrow (0/1) alla colonna inId, per le schede di prevOut/oid
    const done=new Set();
    for(const outid of [prevOut,oid]){ if(!outid)continue; const f=chFind(outid); if(!f||done.has(f.s._id))continue; done.add(f.s._id);
      const ids=new Set(f.s.canali.map(c=>c._id)); const cc=incE.reduce((a,kv)=>a+(ids.has(kv[1])?1:0),0);
      const badge=q('th[data-outg="'+cssq(f.s._id)+'"] .cc'); if(badge) badge.textContent=cc?('('+cc+')'):'';
      const dcell=q('td.agg[data-outg="'+cssq(f.s._id)+'"][data-inch="'+cssq(inId)+'"]'); if(dcell){ const on=ids.has(DB.incroci[inId]); dcell.textContent=on?'1':'·'; dcell.classList.toggle('has',on); }
    }
    // 4) conteggio ingressi instradati della scheda di inId
    const fi=chFind(inId); if(fi){ const icc=fi.s.canali.filter(c=>DB.incroci[c._id]).length; const ib=q('th.dev[data-ing="'+cssq(fi.s._id)+'"] .cc'); if(ib) ib.textContent=icc?('('+icc+')'):''; }
    upStat(); buildNav();
  }
  function highlightRow(oid){ const cell=scroll.querySelector('td.rowlab[data-out="'+cssq(oid)+'"]'); const on=!(cell&&cell.classList.contains('hl'));
    scroll.querySelectorAll('.hl').forEach(x=>x.classList.remove('hl')); scroll.querySelectorAll('.rhl').forEach(x=>x.classList.remove('rhl'));
    if(on&&cell){ cell.classList.add('hl'); scroll.querySelectorAll('td.xp[data-out="'+cssq(oid)+'"]').forEach(td=>td.classList.add('rhl')); } }
  function highlightCol(inId){ const cell=scroll.querySelector('th.ch[data-in="'+cssq(inId)+'"]'); const on=!(cell&&cell.classList.contains('hl'));
    scroll.querySelectorAll('th.ch.hl').forEach(x=>x.classList.remove('hl')); scroll.querySelectorAll('.chl').forEach(x=>x.classList.remove('chl'));
    if(on&&cell){ cell.classList.add('hl'); scroll.querySelectorAll('td.xp[data-in="'+cssq(inId)+'"]').forEach(td=>td.classList.add('chl')); } }
  function cssq(s){ return String(s).replace(/(["\\])/g,'\\$1'); }
  render();
}

function nuovaUnita(){
  const nome=prompt('Nome della nuova unità operativa:','Regia');

  const u={_id:uid('unit_'), nome:(nome.trim()||'Unità'), descrizione:'', macchine:[]};
  (DB.unita=DB.unita||[]).push(u); markDirty(); location.hash='unita/'+u._id;
}

    '(es. la <b>MATRICE CENTRALIZZATA</b> dentro l\'unità CCRF); ogni macchina ha delle <b>schede di ingresso</b> e '+

        el('div',{class:'sub',style:'margin-top:8px'}, occ+' porte occupate'));

      card.append(el('div',{class:'ccrf-dev'}, el('div',{class:'n'},'📦 '+(box.nome||'Box')), el('div',{class:'b'},(box.coppie||[]).length+' coppie')),
        el('div',{class:'sub',style:'margin-top:8px'}, usate+' coppie attive'));
      bc.append(card);

function labelToTipo(lbl){ lbl=String(lbl||'').trim().toLowerCase(); if(!lbl)return '';

function headerMap(headerRow, spec){
  const H=(headerRow||[]).map(h=>String(h||'').trim().toLowerCase());
  const find=pred=>{ for(let i=0;i<H.length;i++) if(pred(H[i])) return i; return -1; };
  const map={};
  for(const k in spec){ const s=spec[k]; let idx=-1;
    if(s.eq) idx=find(h=>s.eq.includes(h));
    if(idx<0&&s.inc) idx=find(h=>s.inc.some(x=>h.includes(x)));
    map[k]=idx; }
  return map;
}

function importCanali(s,reload){

  }}); document.body.append(inp); inp.click(); inp.remove();

function parseCSV(text){
  text=text.replace(/^﻿/,''); const firstNl=text.indexOf('\n'); const head=firstNl<0?text:text.slice(0,firstNl);
  const sep=(head.split(';').length>head.split(',').length)?';':',';
  const rows=[]; let row=[],f='',q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=ch; }
    else { if(ch==='"')q=true; else if(ch===sep){row.push(f);f='';} else if(ch==='\n'){row.push(f);rows.push(row);row=[];f='';} else if(ch==='\r'){} else f+=ch; } }
  if(f!==''||row.length){ row.push(f); rows.push(row); }
  return rows;
}

function importSwitch(sw,reload){
  const inp=el('input',{type:'file',accept:'.xlsx,.csv,.txt,.log,.cfg',style:'display:none',onchange:async e=>{
    const f=e.target.files[0]; if(!f)return;
    try{ const nm=f.name.toLowerCase();
      if(nm.endsWith('.xlsx')||nm.endsWith('.csv')){
        // ---- Import da Excel/CSV (schema: Porta, Patch/Stanza, Descrizione, IP, MAC, Subnet, Gateway, VLAN, Note, Colore) ----
        let rows; if(nm.endsWith('.xlsx')) rows=(await XLSX.read(new Uint8Array(await f.arrayBuffer()))).rows; else rows=parseCSV(await f.text());
        if(!rows||rows.length<1){ toast('File vuoto'); return; }
        const map=headerMap(rows[0], { porta:{eq:['porta']}, patch:{inc:['patch','stanza']}, descrizione:{inc:['descriz']}, ip:{eq:['ip'],inc:['indirizzo ip']},
          mac:{eq:['mac'],inc:['mac address']}, subnet:{inc:['subnet','netmask']}, gateway:{inc:['gateway']}, vlan:{eq:['vlan']}, note:{inc:['note']}, colore:{inc:['colore','color']} });
        const data=rows.slice(1).filter(r=>r.some(v=>String(v||'').trim()!==''));
        const parsed=data.map(r=>newSwPort({porta:xcell(r,map.porta),patch:xcell(r,map.patch),descrizione:xcell(r,map.descrizione),ip:xcell(r,map.ip),
          mac:xcell(r,map.mac),subnet:xcell(r,map.subnet),gateway:xcell(r,map.gateway),vlan:xcell(r,map.vlan),note:xcell(r,map.note),colore:xcell(r,map.colore)}));
        if(!parsed.length){ toast('Nessuna riga valida'); return; }
        // le porte occupate senza colore prendono l'ambra (coerente con lo schema)
        parsed.forEach(p=>{ if(swPortOccupata(p)&&!String(p.colore||'').trim()) p.colore='#f59e0b'; });
        const rep=confirm(parsed.length+' porte lette da «'+f.name+'».\n\nOK = SOSTITUISCI\nAnnulla = AGGIUNGI in coda');
        sw.porte=rep?parsed:(sw.porte||[]).concat(parsed); markDirty(); reload(); toast((rep?'Sostituite ':'Aggiunte ')+parsed.length+' porte');
      } else {
        // ---- Import da log Cisco (show int status/description/mac-address-table/cdp): riempie le porte esistenti ----
        const parsed=SWLOG.parse(await f.text());
        if(!parsed || !Object.keys(parsed.ports).length){ toast('Nessuna porta riconosciuta nel log'); return; }
        const member=parseInt(prompt('Log «'+(parsed.swName||f.name)+'».\nNumero membro dello stack per questo switch:','1'),10)||1;
        const overwrite=!confirm('OK = riempi solo i campi vuoti\nAnnulla = sovrascrivi i campi esistenti');
        sw.porte.forEach(p=>{ p.numero=parseInt(p.porta,10); });          // bridge: SWLOG cerca per .numero
        const st=SWLOG.applyOne(sw, parsed, member, overwrite);
        sw.porte.forEach(p=>{ delete p.numero; if(swPortOccupata(p)&&!String(p.colore||'').trim()) p.colore='#f59e0b'; });
        markDirty(); reload(); toast('Log applicato: '+st.porte+' porte, '+st.campi+' campi'+(st.porte?'':' (nessuna corrispondenza — controlla il membro)'));
      }
    }catch(err){ console.error(err); toast('Errore import: '+err.message); }
  }}); document.body.append(inp); inp.click(); inp.remove();
}

// classifica il connettore in base alla tipologia -> {cls, label} (XLR F/M, RJ45, BNC, generico, libero)
function connKind(tipo){
  const t=String(tipo||'').trim().toUpperCase();
  if(!t || t==='LIBERO') return {cls:'free', label:'—'};
  if(t.includes('RJ45')||t.includes('RJ 45')||t.replace(/\s/g,'')==='RJ45') return {cls:'rj45', label:'RJ45'};
  if(t.includes('BNC')) return {cls:'bnc', label:'BNC'};
  if(t.includes('F')) return {cls:'f', label:'F'};
  if(t.includes('M')) return {cls:'m', label:'M'};
  return {cls:'gen', label:t.slice(0,4)};
}

/* ============================================================
   Import massivo dal foglio "MATRICE CCRF": crea/aggiorna l'unità
   CCRF con la macchina "MATRICE CENTRALIZZATA" e le sue schede.
   ============================================================ */
function cellAt(rows,r,ci){ const row=rows[r]; if(!row)return ''; const v=row[ci]; return v==null?'':String(v).trim(); }
function findRowLabel(rows,label){ for(let r=0;r<rows.length;r++){ if(String((rows[r]||[])[0]||'').trim().toUpperCase()===label) return r; } return -1; }
function parseMatriceRows(rows){
  const rIn=findRowLabel(rows,'INGRESSI'), rOut=findRowLabel(rows,'USCITE');
  if(rIn<0||rOut<0) throw new Error('Foglio non riconosciuto: mancano le sezioni INGRESSI/USCITE.');
  const read=(headerRow,dataStart,dataEnd,idIdx)=>{ const byDev={};
    for(const def of CCRF_COLS){ const [ca,ma,ch,ms,nt,sl]=def[2]; const gid=def[idIdx]; const canali=[];
      for(let r=dataStart;r<=dataEnd && r<rows.length;r++){ const rec={canale:cellAt(rows,r,ca),macchina:cellAt(rows,r,ma),ch:cellAt(rows,r,ch),ms:cellAt(rows,r,ms),note:cellAt(rows,r,nt),slot:cellAt(rows,r,sl)};
        if(!rec.canale&&!rec.macchina&&!rec.ch&&!rec.ms&&!rec.note&&!rec.slot) continue; canali.push(rec); }
      byDev[gid]=canali; }
    return byDev; };
  return { ingressi:read(rIn,rIn+2,rOut-1,0), uscite:read(rOut,rOut+2,rows.length-1,1) };
}
// costruisce la macchina MATRICE CENTRALIZZATA (schede in poi schede out)
function buildMatriceMachineFromDevs(ing, usc){
  const schede=[];
  for(const def of CCRF_MACHINES){ const canali=(ing[def.inId]||[]).map(c=>newCh(c)); if(canali.length) schede.push(newScheda('in',def.nome,def.tipo,canali)); }
  for(const def of CCRF_MACHINES){ const canali=(usc[def.outId]||[]).map(c=>newCh(c)); if(canali.length) schede.push(newScheda('out',def.nome,def.tipo,canali)); }
  return {_id:uid('mac_'), nome:'MATRICE CENTRALIZZATA', schede};
}

/* -------------------- Migrazione / seed -------------------- */
function ensureModel(){
  let changed=false;
  if(!DB.incroci){ DB.incroci={}; changed=true; }
  if(!DB.unita){ DB.unita=[]; changed=true; }
  // 1) legacy DB.ccrf -> unità CCRF + MATRICE CENTRALIZZATA
  if(DB.ccrf){
    const ing={}, usc={}; const oldToNew={};
    const conv=(groups,store)=>{ for(const g of (groups||[])) store[g.id]=(g.canali||[]).map(c=>{ const nc=newCh({canale:c.canale||'',macchina:c.macchina||'',ch:c.ch||'',ms:c.ms||'',note:c.note||'',slot:c.slot||''}); oldToNew[g.id+'#'+c.idx]=nc._id; return nc; }); };
    conv(DB.ccrf.ingressi, ing); conv(DB.ccrf.uscite, usc);
    const machine=buildMatriceMachineFromDevs(ing, usc);
    // ripristina i canali già convertiti (buildMatrice ricrea _id: rimappa mantenendo i nostri)
    machine.schede.forEach(sc=>{ const src=sc.dir==='in'?ing:usc; const def=CCRF_MACHINES.find(d=>d.nome===sc.nome); const arr=def?(src[sc.dir==='in'?def.inId:def.outId]||[]):[]; sc.canali=arr; });
    let u=(DB.unita).find(x=>x._ccrf); if(!u){ u={_id:uid('unit_'),nome:'CCRF',descrizione:'Centro di coordinamento CCRF',_ccrf:true,macchine:[]}; DB.unita.unshift(u); }
    u.macchine=[machine];
    for(const oldOut in (DB.ccrf.incroci||{})){ const oldIn=DB.ccrf.incroci[oldOut]; if(oldToNew[oldOut]&&oldToNew[oldIn]) DB.incroci[oldToNew[oldOut]]=oldToNew[oldIn]; }
    delete DB.ccrf; changed=true;
  }
  // 2) fresh install -> CCRF dal seed di riferimento
  if(!DB.unita.length && typeof SEED_CCRF!=='undefined'){
    const ing={}, usc={};
    for(const g of SEED_CCRF.ingressi) ing[g.id]=g.canali.map(c=>newCh(c));
    for(const g of SEED_CCRF.uscite) usc[g.id]=g.canali.map(c=>newCh(c));
    const machine=buildMatriceMachineFromDevs(ing, usc);
    machine.schede.forEach(sc=>{ const def=CCRF_MACHINES.find(d=>d.nome===sc.nome); const src=sc.dir==='in'?ing:usc; sc.canali=def?(src[sc.dir==='in'?def.inId:def.outId]||[]):sc.canali; });
    DB.unita.unshift({_id:uid('unit_'),nome:'CCRF',descrizione:'Centro di coordinamento CCRF',_ccrf:true,macchine:[machine]}); changed=true;
  }
  // 3) normalizza unità/macchine/schede/canali
  for(const u of DB.unita){
    // vecchissimo modello: ingressi/uscite a livello unità
    if(!u.macchine && (u.ingressi||u.uscite)){ u.macchine=[{_id:uid('mac_'),nome:'Generale',schede:[]}];
      const m=u.macchine[0];
      if((u.ingressi||[]).length) m.schede.push(newScheda('in','Ingressi','analogico',u.ingressi.map(r=>newCh(r))));
      if((u.uscite||[]).length) m.schede.push(newScheda('out','Uscite','analogico',u.uscite.map(r=>newCh(r))));
      delete u.ingressi; delete u.uscite; delete u.patch; changed=true; }
    u.macchine=u.macchine||[];
    // patch audio della stanza (pannelli a sviluppo orizzontale)
    if(!Array.isArray(u.patch)){ u.patch=[]; changed=true; }
    for(const pp of u.patch){ pp.porte=pp.porte||[]; for(const po of pp.porte) if(!po._id){ po._id=uid('po_'); changed=true; } }
    // switch di rete della stanza
    if(!Array.isArray(u.switches)){ u.switches=[]; changed=true; }
    for(const sw of u.switches){ sw.porte=sw.porte||[]; for(const po of sw.porte) if(!po._id){ po._id=uid('sp_'); changed=true; } }
    // pannelli (patch + colore) e box/cassette della stanza
    if(!Array.isArray(u.pannelli)){ u.pannelli=[]; changed=true; }
    for(const pl of u.pannelli){ pl.porte=pl.porte||[]; for(const po of pl.porte) if(!po._id){ po._id=uid('pl_'); changed=true; } }
    if(!Array.isArray(u.box)){ u.box=[]; changed=true; }
    for(const box of u.box){ box.coppie=box.coppie||[]; for(const cp of box.coppie) if(!cp._id){ cp._id=uid('bc_'); changed=true; } }
    // CCRF con macchine appaiate (modello precedente) -> una MATRICE CENTRALIZZATA con schede
    if(u._ccrf && u.macchine.length && u.macchine.every(m=>!m.schede) && u.macchine.some(m=>m.ingressi||m.uscite)){
      const schede=[];
      for(const m of u.macchine){ if((m.ingressi||[]).length) schede.push(newScheda('in',m.nome,m.tipo||'analogico',m.ingressi.map(ensureChId))); }
      for(const m of u.macchine){ if((m.uscite||[]).length) schede.push(newScheda('out',m.nome,m.tipo||'analogico',m.uscite.map(ensureChId))); }
      u.macchine=[{_id:uid('mac_'),nome:'MATRICE CENTRALIZZATA',schede}]; changed=true;
    }
    for(const m of u.macchine){
      // macchina generica modello precedente (ingressi/uscite senza schede)
      if(!m.schede){ m.schede=[];
        if((m.ingressi||[]).length) m.schede.push(newScheda('in','Ingressi',m.tipo||'analogico',m.ingressi.map(ensureChId)));
        if((m.uscite||[]).length) m.schede.push(newScheda('out','Uscite',m.tipo||'analogico',m.uscite.map(ensureChId)));
        delete m.ingressi; delete m.uscite; delete m.tipo; changed=true; }
      for(const s of m.schede){ s.canali=s.canali||[]; if(!s.dir){ s.dir='in'; changed=true; } if(!s.tipo){ s.tipo='analogico'; changed=true; } for(const ch of s.canali) if(!ch._id){ ch._id=uid('ch_'); changed=true; } }
    }
  }
  return changed;
}
/* -------------------- Backup / Ripristino -------------------- */
function download(name,text,type){ const b=new Blob([text],{type:type||'application/octet-stream'}); const u=URL.createObjectURL(b); const a=el('a',{href:u,download:name}); document.body.append(a); a.click(); a.remove(); URL.revokeObjectURL(u); }
function downloadBytes(name, bytes, type){ const b=new Blob([bytes],{type:type||'application/octet-stream'}); const u=URL.createObjectURL(b); const a=el('a',{href:u,download:name}); document.body.append(a); a.click(); a.remove(); URL.revokeObjectURL(u); }
function exportJSON(){ download('database_gestioneaudio_'+new Date().toISOString().slice(0,10)+'.json', JSON.stringify(DB,null,1), 'application/json'); toast('Backup esportato'); }
function importJSON(){
  const inp=el('input',{type:'file',accept:'.json',style:'display:none',onchange:async e=>{
    const f=e.target.files[0]; if(!f)return; try{ const d=JSON.parse(await f.text());
      if(!d.meta){ toast('File non valido'); return; }
      if(confirm('Sostituire i dati correnti con il file importato?')){ DB=d; ensureModel(); markDirty(); route(); toast('Dati importati'); }
    }catch(err){ toast('Errore lettura file'); } }});
  document.body.append(inp); inp.click(); inp.remove();
}
function exportTuttoXLSX(){
  const sheets=[];
  const chRows=dir=>{ const rows=[['Unità','Macchina','Scheda','Tipologia','Canale','Macchina/Segnale','CH','Mono/Stereo','Patch','Note','Slot']];
    for(const u of (DB.unita||[])) for(const m of (u.macchine||[])) for(const s of (m.schede||[])){ if(s.dir!==dir) continue;
      for(const ch of (s.canali||[])) rows.push([u.nome,m.nome,s.nome,tipoLabel(s.tipo),ch.canale,ch.macchina,ch.ch,ch.ms,ch.patch,ch.note,ch.slot]); } return rows; };
  sheets.push({name:'Ingressi',rows:chRows('in')},{name:'Uscite',rows:chRows('out')});
  sheets.push({name:'Incroci',rows:[INCROCI_HEAD,...incrociRows()]});
  downloadBytes('gestione_audio_'+new Date().toISOString().slice(0,10)+'.xlsx', XLSX.build(sheets), 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
  toast('Database esportato in Excel');
}
// scarica una copia autonoma dell'applicazione (il file HTML del progetto)
function downloadAppHTML(){
  const doc=document.documentElement.cloneNode(true);
  const q=sel=>doc.querySelector(sel);
  ['#content','#nav','#modal'].forEach(s=>{ const n=q(s); if(n)n.innerHTML=''; });
  const ov=q('#overlay'); if(ov)ov.classList.remove('show');
  const ts=q('#toast'); if(ts){ ts.classList.remove('show'); ts.textContent=''; }
  const vt=q('#viewTitle'); if(vt)vt.textContent='Dashboard';
  download('GestioneAudio.html', '<!doctype html>\n'+doc.outerHTML, 'text/html;charset=utf-8');
  toast('Applicazione HTML scaricata');
}
function viewBackup(c){
  c.append(el('div',{class:'help',html:'Esporta o reimporta l\'intero database (unità, macchine, canali e incroci) come file JSON, oppure esporta tutto in Excel. '+
    'Il file JSON è il tuo backup: conservalo e potrai ripristinarlo in qualsiasi momento.'}));
  const wrap=el('div',{class:'cards',style:'grid-template-columns:repeat(auto-fill,minmax(240px,1fr))'});
  const act=(t,sub,fn,cls)=>{ const card=el('div',{class:'card',style:'cursor:pointer'}); card.onclick=fn;
    card.append(el('div',{class:'v',style:'font-size:20px'+(cls?';color:'+cls:'')},t), el('div',{class:'sub',style:'margin-top:6px'},sub)); return card; };
  wrap.append(
    act('⤓ Esporta JSON','Scarica il database completo (backup)',exportJSON),
    act('⤒ Importa JSON','Ripristina da un file di backup',importJSON),
    act('⤒ Importa MATRICE CCRF','Crea/aggiorna l\'unità CCRF dal foglio Excel di cablaggio',importMatriceExcel,'#3b82f6'),
    act('📊 Esporta Excel','Ingressi, Uscite e Incroci in .xlsx',exportTuttoXLSX,'#22c55e'),
    act('⤓ Scarica app (HTML)','Salva una copia autonoma dell\'applicazione (GestioneAudio.html)',downloadAppHTML,'#a855f7'),
    act('✕ Azzera incroci','Rimuove tutti gli instradamenti attivi',()=>{ if(confirm('Azzerare TUTTI gli incroci attivi?')){ DB.incroci={}; markDirty(); toast('Incroci azzerati'); } },'#f59e0b'),
  );
  c.append(wrap);
}

/* -------------------- Avvio -------------------- */
$('#btnConnect').addEventListener('click',connectFolder);
$('#btnSave').addEventListener('click',saveDB);
$('#btnBackup').addEventListener('click',()=>location.hash='backup');
window.addEventListener('keydown',e=>{ if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){ e.preventDefault(); saveDB(); } });
(async function init(){
  try{ await IDB.open(); }catch(e){}
  const src = await loadDB();
  let seeded = ensureModel();
  if(!location.hash) location.hash='dashboard';
  route(); renderDbStat();
  if(src==='seed') toast('Database vuoto: premi «📂 Cartella database» per crearlo/collegarlo (o apri AUDIO_database.json)');
  else if(src==='file') toast('Database caricato dal file');
  if(seeded && src!=='seed') markDirty();
})();
